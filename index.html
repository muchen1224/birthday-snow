<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <title>生日快乐</title>
  <style>
    :root {
      --bg-top: #14213d;
      --bg-bottom: #2a4f7c;
      --glow: rgba(255, 255, 255, 0.18);
      --text: #ffffff;
      --subtext: rgba(255, 255, 255, 0.88);
      --accent: #ffe6f0;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    body {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      position: fixed;
      inset: auto;
      border-radius: 50%;
      filter: blur(10px);
      pointer-events: none;
      content: "";
    }

    .aurora {
      width: 68vw;
      height: 68vw;
      top: -10vw;
      right: -16vw;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.12) 0%, rgba(255, 255, 255, 0) 72%);
      animation: drift 10s ease-in-out infinite alternate;
    }

    .aurora::before {
      width: 48vw;
      height: 48vw;
      left: -52vw;
      top: 48vh;
      background: radial-gradient(circle, rgba(173, 216, 255, 0.2) 0%, rgba(173, 216, 255, 0) 72%);
      animation: drift 12s ease-in-out infinite alternate-reverse;
    }

    .aurora::after {
      width: 38vw;
      height: 38vw;
      left: -18vw;
      top: 16vh;
      background: radial-gradient(circle, rgba(255, 223, 235, 0.2) 0%, rgba(255, 223, 235, 0) 72%);
      animation: drift 8s ease-in-out infinite alternate;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, rgba(255, 245, 249, 0.12), rgba(20, 33, 61, 0.9) 65%);
      transition: opacity 1s ease, visibility 1s ease;
    }

    .intro.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .intro-text {
      margin: 0;
      text-align: center;
      font-size: clamp(30px, 10vw, 56px);
      line-height: 1.3;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: #fff7fb;
      text-shadow: 0 0 28px rgba(255, 232, 242, 0.42);
      opacity: 0;
      transform: scale(0.9);
      animation: introPop 1.2s ease forwards;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 28px);
    }

    .card {
      width: min(92vw, 440px);
      padding: 34px 24px 30px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.08));
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22), inset 0 1px 0 rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(12px);
      text-align: center;
      animation: rise 1.2s ease both;
    }

    .eyebrow {
      margin: 0 0 12px;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.75);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 46px);
      line-height: 1.08;
      color: var(--accent);
      text-shadow: 0 0 18px rgba(255, 238, 246, 0.32);
    }

    .message {
      margin: 18px 0 0;
      font-size: 17px;
      line-height: 1.8;
      color: var(--subtext);
      white-space: pre-line;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.62);
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 14px);
      transform: translateX(-50%);
      z-index: 3;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.88);
      background: rgba(11, 20, 37, 0.28);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.14);
      animation: pulse 2.4s ease-in-out infinite;
    }

    body.stage-card .card {
      animation: rise 1.2s ease both;
    }

    body:not(.stage-card) .card,
    body:not(.stage-card) .hint {
      opacity: 0;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(4vw, 3vh, 0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.62;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes introPop {
      0% {
        opacity: 0;
        transform: scale(0.78) translateY(18px);
      }
      60% {
        opacity: 1;
        transform: scale(1.04) translateY(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <canvas id="snow"></canvas>
  <section class="intro" id="intro">
    <h1 class="intro-text">谢淑褀，生日快乐！！！</h1>
  </section>

  <main class="content">
    <section class="card">
      <p class="eyebrow">HAPPY BIRTHDAY</p>
      <h1>谢淑褀，生日快乐</h1>
      <p class="message">想把整个冬天最温柔的雪
都送到你面前。

今天的每一片雪花，
都在替我说一遍:
我好喜欢你。</p>
      <div class="footer">点开这一页的时候，雪会一直为你落下。</div>
    </section>
  </main>

  <div class="hint">在微信里打开效果更好</div>

  <script>
    const canvas = document.getElementById("snow");
    const ctx = canvas.getContext("2d");
    const intro = document.getElementById("intro");

    let width = 0;
    let height = 0;
    let flakes = [];
    let sparkleOffset = 0;
    let snowStarted = false;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.max(90, Math.floor(width * height / 7000));
      flakes = Array.from({ length: count }, createFlake);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createFlake() {
      return {
        x: random(0, width),
        y: random(-height, height),
        r: random(1.2, 4.6),
        speedY: random(0.45, 1.8),
        speedX: random(-0.35, 0.35),
        wobble: random(0.005, 0.02),
        alpha: random(0.45, 0.95),
        blur: random(0, 1),
        swing: random(0, Math.PI * 2)
      };
    }

    function drawFlake(flake) {
      const glow = flake.r * 2.6;
      ctx.beginPath();
      ctx.fillStyle = "rgba(255,255,255," + (flake.alpha * 0.12) + ")";
      ctx.arc(flake.x, flake.y, glow, 0, Math.PI * 2);
      ctx.fill();

      ctx.beginPath();
      ctx.fillStyle = "rgba(255,255,255," + flake.alpha + ")";
      ctx.arc(flake.x, flake.y, flake.r, 0, Math.PI * 2);
      ctx.fill();
    }

    function animate() {
      if (!snowStarted) {
        requestAnimationFrame(animate);
        return;
      }

      ctx.clearRect(0, 0, width, height);
      sparkleOffset += 0.01;

      for (const flake of flakes) {
        flake.swing += flake.wobble;
        flake.x += flake.speedX + Math.sin(flake.swing) * 0.45;
        flake.y += flake.speedY;

        if (flake.y - flake.r > height) {
          flake.y = -10;
          flake.x = random(0, width);
        }

        if (flake.x < -10) flake.x = width + 10;
        if (flake.x > width + 10) flake.x = -10;

        drawFlake(flake);
      }

      drawGlow();
      requestAnimationFrame(animate);
    }

    function drawGlow() {
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "rgba(255,255,255,0.08)");
      gradient.addColorStop(0.4, "rgba(255,255,255,0.02)");
      gradient.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 8; i++) {
        const size = 1.2 + (i % 3);
        const x = ((width / 8) * i + Math.sin(sparkleOffset + i) * 20 + width) % width;
        const y = 80 + Math.cos(sparkleOffset * 1.4 + i) * 22;
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255,0.35)";
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    resize();
    animate();
    setTimeout(() => {
      snowStarted = true;
      document.body.classList.add("stage-card");
      intro.classList.add("hidden");
    }, 1800);
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", resize);
  </script>
</body>
</html>
