<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="format-detection" content="telephone=no,email=no,address=no">
  <title>生日快乐</title>
  <style>
    :root {
      --bg-top: #f7d7cf;
      --bg-bottom: #f4f0d0;
      --glow: rgba(255, 255, 255, 0.18);
      --text: #5f4b3b;
      --subtext: rgba(95, 75, 59, 0.86);
      --accent: #c86d7d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 28%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      color: var(--text);
    }

    body {
      position: relative;
      min-height: 100vh;
      min-height: 100dvh;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .aurora,
    .aurora::before,
    .aurora::after {
      position: fixed;
      inset: auto;
      border-radius: 50%;
      filter: blur(10px);
      pointer-events: none;
      content: "";
    }

    .aurora {
      width: 68vw;
      height: 68vw;
      top: -10vw;
      right: -16vw;
      background: radial-gradient(circle, rgba(255, 246, 235, 0.52) 0%, rgba(255, 246, 235, 0) 72%);
      animation: drift 10s ease-in-out infinite alternate;
    }

    .aurora::before {
      width: 48vw;
      height: 48vw;
      left: -52vw;
      top: 48vh;
      background: radial-gradient(circle, rgba(255, 231, 186, 0.28) 0%, rgba(255, 231, 186, 0) 72%);
      animation: drift 12s ease-in-out infinite alternate-reverse;
    }

    .aurora::after {
      width: 38vw;
      height: 38vw;
      left: -18vw;
      top: 16vh;
      background: radial-gradient(circle, rgba(255, 203, 214, 0.32) 0%, rgba(255, 203, 214, 0) 72%);
      animation: drift 8s ease-in-out infinite alternate;
    }

    .intro {
      position: fixed;
      inset: 0;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at center, rgba(255, 249, 239, 0.76), rgba(236, 197, 188, 0.92) 65%);
      transition: opacity 1s ease, visibility 1s ease;
      overflow: hidden;
    }

    .intro.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .intro-text {
      margin: 0;
      text-align: center;
      font-size: clamp(38px, 12vw, 72px);
      line-height: 1.22;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: #b4586b;
      text-shadow: 0 0 22px rgba(255, 247, 231, 0.65), 0 0 48px rgba(255, 232, 214, 0.34);
      opacity: 0;
      transform: scale(0.9);
      animation: introPop 1.5s ease forwards;
      position: relative;
      z-index: 2;
    }

    .intro-glow {
      position: absolute;
      width: 58vw;
      height: 58vw;
      max-width: 420px;
      max-height: 420px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 247, 227, 0.62) 0%, rgba(255, 233, 205, 0.12) 38%, rgba(255, 239, 246, 0) 72%);
      filter: blur(12px);
      animation: haloPulse 2.8s ease-in-out infinite;
      opacity: 0.95;
    }

    .intro-flash {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.42) 0%, rgba(255, 248, 227, 0.12) 18%, rgba(255, 255, 255, 0) 48%);
      opacity: 0;
      animation: introFlash 1.6s ease-out 0.45s forwards;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: 100%;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: calc(env(safe-area-inset-top) + 24px) 20px calc(env(safe-area-inset-bottom) + 28px);
    }

    .card {
      width: min(92vw, 450px);
      padding: 124px 24px 30px;
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.38), rgba(255, 250, 240, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.34);
      box-shadow: 0 20px 60px rgba(146, 112, 87, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      text-align: center;
      animation: rise 1.2s ease both;
      position: relative;
      overflow: visible;
    }

    .photo-frame {
      position: absolute;
      left: 50%;
      top: -70px;
      transform: translateX(-50%) rotate(-2deg);
      width: min(62vw, 220px);
      padding: 10px 10px 18px;
      border-radius: 26px;
      background: rgba(255, 252, 246, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.76);
      box-shadow: 0 16px 40px rgba(146, 112, 87, 0.22);
    }

    .photo-frame::before {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 32px;
      background: linear-gradient(135deg, rgba(255, 246, 233, 0.56), rgba(255, 221, 228, 0.24));
      z-index: -1;
      filter: blur(16px);
    }

    .photo-frame img {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4.2;
      object-fit: cover;
      object-position: center center;
      border-radius: 18px;
      box-shadow: 0 10px 22px rgba(85, 67, 57, 0.12);
    }

    .photo-note {
      margin-top: 12px;
      font-size: 12px;
      letter-spacing: 0.2em;
      text-indent: 0.2em;
      color: rgba(143, 105, 112, 0.82);
    }

    .photo-caption {
      margin: 12px 0 4px;
      font-size: 13px;
      color: rgba(131, 95, 101, 0.84);
    }

    .eyebrow {
      margin: 0 0 12px;
      letter-spacing: 0.3em;
      text-indent: 0.3em;
      font-size: 12px;
      color: rgba(123, 95, 82, 0.72);
    }

    h1 {
      margin: 0;
      font-size: clamp(32px, 8vw, 46px);
      line-height: 1.08;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(255, 243, 233, 0.52);
    }

    .message {
      margin: 18px 0 0;
      font-size: 17px;
      line-height: 1.8;
      color: var(--subtext);
      white-space: pre-line;
    }

    .footer {
      margin-top: 20px;
      font-size: 13px;
      color: rgba(115, 88, 71, 0.7);
    }

    .hint {
      position: fixed;
      left: 50%;
      bottom: calc(env(safe-area-inset-bottom) + 14px);
      transform: translateX(-50%);
      z-index: 3;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(105, 78, 60, 0.88);
      background: rgba(255, 249, 238, 0.42);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.28);
      animation: pulse 2.4s ease-in-out infinite;
    }

    body.stage-card .card {
      animation: rise 1.2s ease both;
    }

    body:not(.stage-card) .card,
    body:not(.stage-card) .hint {
      opacity: 0;
    }

    @keyframes rise {
      from {
        opacity: 0;
        transform: translateY(28px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0);
      }
      to {
        transform: translate3d(4vw, 3vh, 0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 0.62;
      }
      50% {
        opacity: 1;
      }
    }

    @keyframes introPop {
      0% {
        opacity: 0;
        transform: scale(0.78) translateY(18px);
      }
      60% {
        opacity: 1;
        transform: scale(1.04) translateY(0);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes haloPulse {
      0%, 100% {
        transform: scale(0.92);
        opacity: 0.82;
      }
      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    @keyframes introFlash {
      0% {
        opacity: 0;
      }
      30% {
        opacity: 1;
      }
      100% {
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="aurora"></div>
  <canvas id="dandelion"></canvas>
  <section class="intro" id="intro">
    <div class="intro-flash"></div>
    <div class="intro-glow"></div>
    <h1 class="intro-text">谢淑褀，生日快乐！！！</h1>
  </section>

  <main class="content">
    <section class="card">
      <div class="photo-frame">
        <img src="assets/birthday-photo.jpg" alt="谢淑褀的照片">
        <div class="photo-note">APRIL MEMORY</div>
      </div>
      <div class="photo-caption">春天来了，你比春天更好看。</div>
      <p class="eyebrow">HAPPY BIRTHDAY</p>
      <h1>谢淑褀，生日快乐</h1>
      <p class="message">想把四月的晚风，
还有刚刚好的春天，
都悄悄放到你身边。

今天飘过你眼前的每一朵蒲公英，
都是我在认真跟你说:
谢淑褀，能陪你过生日，
我真的很开心。</p>
      <div class="footer">今年的春天很好，但你比春天还要更让人心动一点。</div>
    </section>
  </main>

  <div class="hint">在微信里打开，会有春风和蒲公英</div>

  <script>
    const canvas = document.getElementById("dandelion");
    const ctx = canvas.getContext("2d");
    const intro = document.getElementById("intro");

    let width = 0;
    let height = 0;
    let seeds = [];
    let sparkleOffset = 0;
    let floatStarted = false;

    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = window.innerWidth;
      height = window.innerHeight;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const count = Math.max(42, Math.floor(width * height / 14000));
      seeds = Array.from({ length: count }, createSeed);
    }

    function random(min, max) {
      return Math.random() * (max - min) + min;
    }

    function createSeed() {
      return {
        x: random(-width * 0.2, width),
        y: random(-height * 0.15, height),
        size: random(0.7, 1.35),
        speedX: random(0.45, 1.3),
        speedY: random(-0.06, 0.4),
        drift: random(0.008, 0.022),
        alpha: random(0.5, 0.9),
        swing: random(0, Math.PI * 2),
        rotate: random(0, Math.PI * 2),
        spin: random(-0.01, 0.01)
      };
    }

    function drawSeed(seed) {
      const puff = 11 * seed.size;
      const stem = 15 * seed.size;
      const featherCount = 10;

      ctx.save();
      ctx.translate(seed.x, seed.y);
      ctx.rotate(seed.rotate);

      ctx.beginPath();
      ctx.fillStyle = "rgba(255,248,238," + (seed.alpha * 0.18) + ")";
      ctx.arc(0, 0, puff * 1.15, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = "rgba(164, 142, 112," + (seed.alpha * 0.9) + ")";
      ctx.lineWidth = 1.2 * seed.size;
      ctx.beginPath();
      ctx.moveTo(0, 1);
      ctx.lineTo(0, stem);
      ctx.stroke();

      for (let i = 0; i < featherCount; i++) {
        const angle = (-Math.PI / 2) + (i / (featherCount - 1) - 0.5) * 1.6;
        const x = Math.cos(angle) * puff;
        const y = Math.sin(angle) * puff;

        ctx.beginPath();
        ctx.strokeStyle = "rgba(255,255,255," + seed.alpha + ")";
        ctx.lineWidth = 1;
        ctx.moveTo(0, 0);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.beginPath();
        ctx.fillStyle = "rgba(255,255,255," + (seed.alpha * 0.9) + ")";
        ctx.arc(x, y, 1.4 * seed.size, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.beginPath();
      ctx.fillStyle = "rgba(206, 188, 155," + seed.alpha + ")";
      ctx.arc(0, 0, 1.8 * seed.size, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function animate() {
      if (!floatStarted) {
        requestAnimationFrame(animate);
        return;
      }

      ctx.clearRect(0, 0, width, height);
      sparkleOffset += 0.01;

      for (const seed of seeds) {
        seed.swing += seed.drift;
        seed.rotate += seed.spin;
        seed.x += seed.speedX + Math.sin(seed.swing) * 0.55;
        seed.y += seed.speedY + Math.cos(seed.swing * 0.8) * 0.18;

        if (seed.x > width + 40 || seed.y > height + 30 || seed.y < -40) {
          seed.x = random(-60, -10);
          seed.y = random(0, height);
          seed.rotate = random(0, Math.PI * 2);
        }

        drawSeed(seed);
      }

      drawGlow();
      requestAnimationFrame(animate);
    }

    function drawGlow() {
      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "rgba(255,255,255,0.1)");
      gradient.addColorStop(0.4, "rgba(255,241,224,0.06)");
      gradient.addColorStop(1, "rgba(255,255,255,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      for (let i = 0; i < 8; i++) {
        const size = 1.2 + (i % 3);
        const x = ((width / 8) * i + Math.sin(sparkleOffset + i) * 20 + width) % width;
        const y = 80 + Math.cos(sparkleOffset * 1.4 + i) * 22;
        ctx.beginPath();
        ctx.fillStyle = "rgba(255,245,231,0.45)";
        ctx.arc(x, y, size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    resize();
    animate();
    setTimeout(() => {
      floatStarted = true;
      document.body.classList.add("stage-card");
      intro.classList.add("hidden");
    }, 2600);
    window.addEventListener("resize", resize);
    window.addEventListener("orientationchange", resize);
  </script>
</body>
</html>
